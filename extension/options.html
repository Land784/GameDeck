<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GameDeck Companion</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #101014;
      color: #e8e8ee;
      max-width: 420px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h1 { font-size: 18px; }
    p { color: #b0b0b8; font-size: 13px; line-height: 1.5; }
    label { display: block; font-size: 13px; margin-bottom: 6px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #33333d;
      background: #1a1a22;
      color: #e8e8ee;
      font-family: monospace;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      background: #4fc3f7;
      color: #101014;
      font-weight: 600;
      cursor: pointer;
    }
    #statusRow { display: flex; align-items: center; gap: 8px; margin-top: 20px; font-size: 13px; }
    #dot { width: 10px; height: 10px; border-radius: 50%; background: #777; }
    #dot.connected { background: #22c55e; }
    #dot.connecting { background: #eab308; }
    #saved { color: #22c55e; font-size: 13px; margin-left: 8px; visibility: hidden; }
  </style>
</head>
<body>
  <h1>GameDeck Companion</h1>
  <p>
    Paste the token from the GameDeck tray menu (right-click the tray icon,
    then "Copy extension token"). The extension only ever talks to the
    GameDeck app on this computer.
  </p>
  <label for="token">Extension token</label>
  <input id="token" type="text" spellcheck="false" placeholder="paste token here">
  <button id="save">Save</button><span id="saved">Saved</span>
  <div id="statusRow"><span id="dot"></span><span id="statusText">Disconnected</span></div>
  <script src="options.js"></script>
</body>
</html>
